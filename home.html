.menu {
  overflow: hidden;
  display: none;
  position: absolute;
  cursor: pointer;
  zoom: 0.8;
  top: 26px;
  right: 20px;
  z-index: 3;
}

.menu:hover {
  transform: scale(1.2);
}

.slider {
  position: absolute;
  display: block;
  top: 100%;
  width: 100%;
  height: 400px;
  background: rgba(30,30,30,0.85);
  border-radius: 30px 30px 0px 0px;
  box-shadow: 0px 0px 12px rgba(70,70,70,0.55);
  left: 0%;
  z-index: 10;
}

#menu_list {
  position: absolute;
  list-style-type: none;
  overflow-y: scroll;
  overflow-x: hidden;
  width: 100%;
  height: 96%;
  bottom: -20px;
  right: 10px;
}

.menu_item {
  display: flex;
  width: 70%;
  height: 32px;
  padding-top: 9px;
  margin-top: 10px;
  margin-bottom: 10px;
  margin-left: 0px;
  text-align: center;
  border-radius: 30px;
  cursor: pointer;
  background: rgba(70, 70, 70, 0.5);
  box-shadow: 0px 0px 1px 1px rgba(100, 100, 100, 0);
}

.menu_item h {
  width: 100%;
  height: 32px;
  text-align: center;
  font-family: "Helvetica Neue", "roboto", sans-serif;
  color: #bbb;
  font-weight: 400;
  font-size: 18px;
}

.lock {
  position: absolute;
  display: none;
  right: 100px;
  top: calc(70% + 10px);
  height: 46px;
  width: 46px;
  box-shadow: 2px 2px 6px 4px rgba(100, 100, 100, 0.2);
  border-radius: 50%;
  cursor: pointer;
}

.lock:hover {
  box-shadow: 2px 2px 6px 4px rgba(120, 120, 120, 0.7);
}

.overlay {
  position: absolute;
  display: none;
  top: 0%;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.15);
  right: 0px;
  z-index: 4;
}

.oval {
  position: absolute;
  display: none;
  height: 7px;
  width: 14px;
  background-color: #000;
  border-radius: 50%;
  top: calc(45% + 180px);
  left: calc(40% + 6px);
  transform: translate(-50%);
  overfow: hidden;
}

.hallo {
  position: absolute;
  display: none;
  height: 90px;
  width: 90px;
  background-color: rgba(0, 0, 0, 0);
  border-radius: 42px;
  border: 0px solid red;
  box-shadow: 0px 0px 25px 25px rgba(250, 250, 250, 0.25);
  top: calc(45% + 5px);
  left: calc(40% + 4px);
  transform: translate(-50%);
  overfow: hidden;
}

.frame {
  position: absolute;
  display: none;
  height: 530px;
  width: 260px;
  background-color: rgba(0, 0, 0, 0);
  border-radius: 42px;
  border: 0px solid red;
  top: calc(50% - 300px);
  left: calc(40% + 6px);
  transform: translate(-50%);
  overfow: hidden;
}

.copyright {
  position: absolute;
  display: block;
  border: 0px solid red;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  color: #777;
  font-weight: 400;
  bottom: 10px;
  left: 20px;
  overfow: hidden;
}
	
.legal {
  position: absolute;
  display: block;
  width: 200px;	
  border: 0px solid red;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  color: #777;
  font-weight: 400;
  cursor: pointer;
  bottom: 10px;
  right: 120px;
  text-align: right;
  overfow: hidden;
}
	
.privacy {
  position: absolute;
  display: block;
  width: 100px;	
  border: 0px solid red;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  color: #777;
  font-weight: 400;
  cursor: pointer;	
  bottom: 10px;
  right: 10px;
  text-align: left;
  overfow: hidden;
}

.privacy:hover{
	color: #eee;
}

.legal:hover{
	color: #eee;
}
