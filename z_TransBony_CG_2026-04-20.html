<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <meta name="HandheldFriendly" content="true" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
        <meta name="format-detection" content="telephone=no" />
        <style>
            body,html {
            position: relative; 
            background: #fff;
            color: #000;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center
            }
            /*------------------ CARD 1 -------------------------*/
            .eweeg {
            position: absolute;
            display: none;
            left: calc(50% - 50px);
            transform: translate(-50%, -50%);
            top: 50px;
            height: 50px;
            width: 125px;
            font-family: "helvetica neue", "roboto", sans-serif;
            font-weight: 200;
            font-size: 30px;
            text-align: right;
            color: #555;
            }
            .o {
            position: absolute;
            display: none;
            left: calc(50% + 13px);
            top: 31px;
            height: 32px;
            width: 31px;
            cursor: pointer;
            background-image: linear-gradient(to top right, #ff6a00, #ff6a00, #fff);
            border-radius: 50px;
            }
            .title {
            position: absolute;
            display: block;
            left: calc(50% - 0px);
            transform: translate(-50%);
            top: 30px;
            height: 180px;
            line-height: 35px;
            width: 100%;
            min-width: 200px;
            font-family: "helvetica neue", "roboto", sans-serif;
            font-weight: 400;
            font-size: 38px;
            text-align: center;
            color: #000;
            z-index: 1;
            }
            .paragraph {
            position: relative;
            display: block;
            left: calc(50% - 0px);
            transform: translate(-50%);
            top: 40px;
            height: 10px;
            line-height: 20px;
            width: 400px;
            padding-top: 30px;
            padding-left: 0px;
            font-family: "helvetica neue", "roboto", sans-serif;
            font-weight: 400;
            font-size: 18px;
            text-align: center;
            color: #777;
            }      
            .vid_btn {
            #display: none;  
            margin-top: 70px;
            cursor: pointer;
            z-index: 10  
            }
            #vid_btn_i {
            #display: none;  
            margin-top: 56px;
            cursor: pointer;
            z-index: 10  
            }
            .tn {
            float: right;
            margin-top: 12px;
            margin-right: 20px;
            width: 24px;
            height: 24px;
            filter: invert(100%);
            cursor: pointer;
            }
            .tn2 {
            float: right;
            margin-top: 12px;
            margin-right: 20px;
            width: 50px;
            height: 33.3px;
            filter: invert(20%);
            cursor: pointer;
            }
            .tn3 {
            float: right;
            margin-top: 12px;
            margin-right: 20px;
            width: 33.3px;
            height: 33.3px;
            filter: invert(20%);
            cursor: pointer;
            }
            .ttl_tx {
            position: relative;
            display: block;
            left: calc(10% - 0px);
            top: 10px;
            height: 20px;
            width: 80%;
            font-family: "helvetica neue", "roboto", sans-serif;
            font-weight: 400;
            font-size: 16px;
            text-align: center;
            color: #fff;
            }
            .copyright {
            position: absolute;
            left: 0px;
            width: 250px;
            bottom: 0%;
            margin-bottom: 20px;
            margin-left: 0px;
            padding: 0px 5px;
            text-align: left;
            color: #666;
            font-family: "helvetica neue", "roboto", sans-serif;
            font-weight: 400;
            font-size: 10px;
            }
            .pinicon {
            position: absolute;
            width: 120px;  
            right: calc(0% - 0px);
            bottom: calc(0% - 0px);
            filter: opacity(100%);
            zoom: 1;
            z-index: 0  
            }
            /*-------------------Video---------------------*/
            .overlay {
            position: fixed;
            display: none;
            top: 0%;
            width: 100%;
            height: 100%;
            left: 0%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 108;
            }
            /*--------------____DEMO-------------------*/
            .frame {
            position: fixed;
            display: none;
            height: 702.2px;
            width: 348px;
            background-color: rgba(0, 0, 0, 0);
            border-radius: 42px;
            border: 0px solid red;
            top: calc(50% - 01px);
            left: calc(50% + 3px);
            transform: translate(-50%, -50%);
            overfow: hidden;
            z-index: 110;
            }
            .video {
            position: fixed;
            display: none;
            height: 672px;
            width: 338px;
            background-color: rgba(0, 0, 0, 0);
            border-radius: 42px;
            border: 0px solid red;
            top: calc(50% - 4px);
            left: calc(50% + 2px);
            transform: translate(-50%, -50%);
            overfow: hidden;
            z-index: 109;
            }
            /*--------------____DEMO-------------------*/
            .frameA {
            position: fixed;
            display: none;
            height: 700px;
            width: 330px;
            background-color: rgba(0, 0, 0, 0);
            border-radius: 42px;
            border: 0px solid red;
            top: calc(50% - 01px);
            left: calc(50% + 3px);
            transform: translate(-50%, -50%);
            overfow: hidden;
            z-index: 110;
            }
            .videoA {
            position: fixed;
            display: none;
            height: 671px;
            width: 328px;
            background-color: rgba(0, 0, 0, 0);
            border-radius: 42px;
            border: 0px solid red;
            top: calc(50% - 3px);
            left: calc(50% + 2px);
            transform: translate(-50%, -50%);
            overfow: hidden;
            z-index: 109;
            }
            #vid_btn1_i{
            z-index: 90
            }
        </style>
    </head>
