<!DOCTYPE html>
 <html lang="en" >
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
 <meta name="HandheldFriendly" content="true" />
 <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
 <meta name="format-detection" content="telephone=no">
 
<style>

body {
            background: #424242;
            color: #000;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            #display: flex;
            overflow-x: hidden;
            overflow-y: scroll;
            flex-direction: column;
            align-items: center;
            justify-content: center;
	        overflow-x: hidden !important;
            width: 100%;
            max-width: 100%;
	        min-width: 100%;        
}
  
.pinicon {     
  position: absolute;
  display: block;
  top: 80%;
  right: -200px;
  transform: translateY(-50%);
  filter: contrast(100%);
  filter: opacity(10%);
  z-index: -1
} 


.container {
            width: 90%;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
}


.main-content {
            display: grid;
            grid-template-columns: 100% 0%;
            gap: 0px;
            margin-top: 0px;
}

@media (max-width: 768px) {
            .main-content {
                grid-template-columns: 100%;
            }
}


/*------------------ CARD 1 -------------------------*/

.card {
            flex-basis: 100%;
            #background: #fff;
            border-radius: 0px;
            padding: 0px;
            transition: transform 0.3s ease;
            display: inline-block;
            border-bottom: 0px solid #eee;
}



            
.eweeg {
  position: relative;
  display: block;
  left: calc(50% - 50px);
  transform: translate(-50%, -50%);
  top: 40px;
  height: 50px;
  width: 125px;
  font-family: 'helvetica neue', 'roboto', sans-serif;
  font-weight: 100;
  font-size: 30px;
  text-align: right;	
  color: #aaa;		
}



.o {
  position: relative;
  display: block;
  left: calc(50% + 13px);
  top: -28px;
  height: 32px;
  width: 31px;
  cursor: pointer;
  background-image: linear-gradient(to top right, #ff6a00, #ff6a00, #fff);
  border-radius: 50px;
}

.title {
  position: relative;
  display: block;
  left: calc(50% - 0px);
  transform: translate(-50%);
  top:20px;
  height: 20px;
  line-height: 55px;
  width: 100%;
  min-width: 200px;
  font-family: 'helvetica neue', 'roboto', sans-serif;
  font-weight: 400;
  font-size: 52px;
  text-align: center;	
  color: #ccc;	
  z-index: 1;
}
  
.code {
  position: relative;
  overflow: hidden;
  margin-top: 60px;
  display: flex;
  width: calc(70% - 0px);
  height: 60px;
  max-height: 60px;
  left: calc(15% - 0px);
  border-radius: 12px;
  z-index:2
}

.op_img {
  position: relative;
  display: block;
  left: calc(50% + 15px);
  transform: translate(-50%);
  top:0px;
  height: 500px;
  filter: brightness(105%);
  width: 100%;
  max-width: 800px;
  object-fit: contain;
  overflow: hidden;
  z-index: 1;
}


.paragraph{
  position: relative;
  display: block;
  left: calc(50% - 0px);
  transform: translate(-50%);
  top:-100px;
  height: 180px;
  line-height: 24px;
  width: 400px;
  padding-top:  30px;
  padding-left:  0px;
  font-family: 'helvetica neue', 'roboto', sans-serif;
  font-weight: 400;
  font-size: 17px;
  text-align: center;	
  color: #ccc;	
  z-index: 2
}





     


</style>
  
</head>
